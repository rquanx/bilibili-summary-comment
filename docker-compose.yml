x-proxy-env: &proxy-env
  NODE_USE_ENV_PROXY: "1"
  HTTP_PROXY: ${DOCKER_HTTP_PROXY:-http://host.docker.internal:7897}
  HTTPS_PROXY: ${DOCKER_HTTPS_PROXY:-http://host.docker.internal:7897}
  ALL_PROXY: ${DOCKER_ALL_PROXY:-socks5://host.docker.internal:7897}
  http_proxy: ${DOCKER_HTTP_PROXY:-http://host.docker.internal:7897}
  https_proxy: ${DOCKER_HTTPS_PROXY:-http://host.docker.internal:7897}
  all_proxy: ${DOCKER_ALL_PROXY:-socks5://host.docker.internal:7897}
  NO_PROXY: ${DOCKER_NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
  no_proxy: ${DOCKER_NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
  GEMINI_PROXY_URL: ${GEMINI_PROXY_URL:-http://host.docker.internal:7897}

services:
  video-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: video-pipeline:local
    restart: always
    env_file:
      - .env
    environment:
      <<: *proxy-env
      TZ: ${CRON_TIMEZONE:-Asia/Shanghai}
      CRON_TIMEZONE: ${CRON_TIMEZONE:-Asia/Shanghai}
      WORK_ROOT: work
      PIPELINE_DB_PATH: work/pipeline.sqlite3
      BILI_AUTH_FILE: .auth/bili-auth.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./work:/app/work
      - ./.auth:/app/.auth
    command: ["npm", "run", "start"]

  video-pipeline-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: video-pipeline:gpu
    restart: always
    env_file:
      - .env
    environment:
      <<: *proxy-env
      TZ: ${CRON_TIMEZONE:-Asia/Shanghai}
      CRON_TIMEZONE: ${CRON_TIMEZONE:-Asia/Shanghai}
      WORK_ROOT: work
      PIPELINE_DB_PATH: work/pipeline.sqlite3
      BILI_AUTH_FILE: .auth/bili-auth.json
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      VIDEOCAPTIONER_LOCAL_FASTER_WHISPER_BIN: /opt/videocaptioner/bin/Faster-Whisper-XXL
      VIDEOCAPTIONER_LOCAL_FASTER_WHISPER_MODEL_PATH: /opt/videocaptioner/models/faster-whisper-large-v3-turbo
      VIDEOCAPTIONER_LOCAL_FASTER_WHISPER_DEVICE: cuda
      VIDEOCAPTIONER_LOCAL_FASTER_WHISPER_VAD_METHOD: silero-v4
      VIDEOCAPTIONER_LOCAL_FASTER_WHISPER_VAD_THRESHOLD: "0.4"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./work:/app/work
      - ./.auth:/app/.auth
      - type: bind
        source: ${VIDEOCAPTIONER_HOST_MODEL_ROOT:-./.videocaptioner/models}
        target: /opt/videocaptioner/models
    gpus: all
    command: ["npm", "run", "start"]
